name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: coffee/coffee-app/package-lock.json
      - name: Install and build Angular app
        working-directory: coffee/coffee-app
        run: |
          npm ci --legacy-peer-deps
          npm run build
          touch dist/CoffeeApp/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: coffee/coffee-app/dist/CoffeeApp

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v4
